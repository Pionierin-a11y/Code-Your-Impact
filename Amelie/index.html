<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
	      <video id="animation" src="./animation.mp4" loop="true" crossorigin="anonymous" playsinline></video>
		  <audio id="soundeffekt" src="./sound.mp3" preload="auto" crossorigin="anonymous"></audio>
      </a-assets>

		<a-camera position="0 0 0" look-controls="enabled: false">
        	<a-cursor fuse="false" raycaster="objects: .klickbar"></a-cursor>
      	</a-camera>

		<a-entity mindar-image-target="targetIndex: 0">
        	<a-video src="#animation" class="klickbar" ar-interaktion position="0 0 0" width="0.6" height="0.6"></a-video>
      	</a-entity>
    </a-scene>
  </body>
</html>
